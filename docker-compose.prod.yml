# Imágenes publicadas en Quay. Uso: podman compose -f docker-compose.prod.yml up -d
# Requiere: make login-quay && make pull-images  (o imágenes ya en local)

services:
  db:
    image: quay.io/calopezb/my-golf-db:latest
    environment:
      POSTGRES_USER: mygolf
      POSTGRES_PASSWORD: mygolf
      POSTGRES_DB: mygolf
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mygolf -d mygolf"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: quay.io/calopezb/my-golf-api:latest
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://mygolf:mygolf@db:5432/mygolf
    depends_on:
      db:
        condition: service_healthy

  capture:
    image: quay.io/calopezb/my-golf-capture:latest
    ports:
      - "3000:80"
    depends_on:
      - api

  stats:
    image: quay.io/calopezb/my-golf-stats:latest
    ports:
      - "3001:80"
    depends_on:
      - api

volumes:
  pgdata:
